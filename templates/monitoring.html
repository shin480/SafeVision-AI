<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>실시간 모니터링</title>

  <link rel="stylesheet" href="../static/css/sidebar.css" />
  <link rel="stylesheet" href="../static/css/monitoring.css" />
</head>
<body>
  <div id="sidebar-container"></div>

  <main class="main">
    <h1>실시간 모니터링</h1>

    <section class="monitor-card">
      <div class="monitor-toolbar">
        <label for="cctvSelect">CCTV 선택</label>

        <select id="cctvSelect">
          <option value="1">1번 CCTV</option>
          <option value="2">2번 CCTV</option>
          <option value="3">3번 CCTV</option>
        </select>

        <button id="searchBtn">검색</button>
      </div>

      <div class="video-box" id="videoBox">
        <!-- 나중에 실시간 영상 또는 스트리밍 이미지 들어갈 자리 -->
      </div>
    </section>

    <section class="status-area">
      <div class="risk-card">
        <div class="risk-left">
          <p>현재 위험도</p>
          <strong id="currentRiskLevel">-</strong>
          <span id="currentRiskText">-</span>
        </div>

        <div class="risk-divider"></div>

        <div class="risk-right">
          <p>위험도 점수</p>
          <strong id="riskScore">-</strong>
        </div>
      </div>

      <div class="violation-card">
        <h2>위반 현황</h2>

        <ul>
          <li>
            <span>안전모 미착용</span>
            <strong id="helmetViolation">-</strong>
          </li>

          <li>
            <span>안전조끼 미착용</span>
            <strong id="vestViolation">-</strong>
          </li>

          <li>
            <span>위험구역 침입</span>
            <strong id="zoneViolation">-</strong>
          </li>
        </ul>
      </div>
    </section>
  </main>

  <script src="../static/js/sidebar.js"></script>
  <script src="../static/js/common.js"></script>
  <script src="../static/js/monitoring.js"></script>
</body>
</html>
