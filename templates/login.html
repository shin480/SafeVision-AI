<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SafeVision AI - Login</title>

  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/login.css" />
</head>
<body>
  <main class="login-page">
    <section class="login-brand-section">
      <div class="brand-content">
        <div class="brand-logo">
          <img src="/static/img/logo.png" alt="SafeVision AI Logo" class="shield-icon">
          <h1>SafeVision <span>AI</span></h1>
        </div>

        <p class="brand-subtitle">스마트 안전 관리 시스템</p>
      </div>

      <div class="construction-visual"></div>
    </section>

    <section class="login-card">
      <form class="login-form" action="./dashboard.html" method="get">
        <h2>관리자 로그인</h2>

        <div class="form-group">
          <label for="admin-id">아이디</label>
          <input
            id="admin-id"
            type="text"
            name="admin_id"
            placeholder="아이디를 입력하세요"
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label for="admin-password">비밀번호</label>
          <input
            id="admin-password"
            type="password"
            name="admin_password"
            placeholder="비밀번호를 입력하세요"
            autocomplete="current-password"
          />
        </div>

        <div class="option-row">
          <label class="check-label">
            <input type="checkbox" name="save_id" />
            <span>아이디 저장</span>
          </label>
        </div>

        <button type="submit" class="login-button">로그인</button>
      </form>

      <p class="copyright">© 2026 SafeVision-AI. All rights reserved.</p>
    </section>
  </main>

  <script src="/static/js/login.js"></script>
</body>
</html>
