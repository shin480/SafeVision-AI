<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SafeVision-AI Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <script src="{{ url_for('static', filename='js/common.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}" defer></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">SafeVision-AI</div>

      <nav class="nav-menu">
        <a href="./index.html" class="nav-link active">대시보드</a>
        <a href="./monitoring.html" class="nav-link">실시간 모니터링</a>
        <a href="./event-log.html" class="nav-link">이벤트 로그</a>
        <a href="./cctv-manage.html" class="nav-link">CCTV 관리</a>
      </nav>
    </aside>

    <main class="main">
      <header class="header">
        <h1>안전 모니터링 대시보드</h1>
        <div class="header-info">PPE Detection System</div>
      </header>

      <section class="card-grid">
        <div class="card safe">
          <div class="card-title">SAFE</div>
          <div class="card-value">12</div>
        </div>

        <div class="card warning">
          <div class="card-title">WARNING</div>
          <div class="card-value">3</div>
        </div>

        <div class="card danger">
          <div class="card-title">DANGER</div>
          <div class="card-value">2</div>
        </div>

        <div class="card critical">
          <div class="card-title">CRITICAL</div>
          <div class="card-value">1</div>
        </div>
      </section>

      <section class="content-section">
        <div class="section-title">최근 위험 이벤트</div>

        <table class="table">
          <thead>
            <tr>
              <th>시간</th>
              <th>CCTV</th>
              <th>감지 내용</th>
              <th>위험 점수</th>
              <th>등급</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>10:24</td>
              <td>CAM-01</td>
              <td>안전모 미착용</td>
              <td>35</td>
              <td><span class="status-badge status-warning">WARNING</span></td>
            </tr>
            <tr>
              <td>10:31</td>
              <td>CAM-02</td>
              <td>안전조끼 미착용 + 위험구역 침입</td>
              <td>75</td>
              <td><span class="status-badge status-danger">DANGER</span></td>
            </tr>
            <tr>
              <td>10:42</td>
              <td>CAM-03</td>
              <td>안전모 미착용 + 안전조끼 미착용 + 위험구역 침입</td>
              <td>100</td>
              <td><span class="status-badge status-critical">CRITICAL</span></td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>
</body>
</html>
