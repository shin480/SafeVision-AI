<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>SafeVision-AI CCTV Manage</title>
  <link rel="stylesheet" href="./css/style.css">
  <script src="./js/common.js" defer></script>
  <script src="./js/cctv-manage.js" defer></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">SafeVision-AI</div>

      <nav class="nav-menu">
        <a href="./index.html" class="nav-link">대시보드</a>
        <a href="./monitoring.html" class="nav-link">실시간 모니터링</a>
        <a href="./event-log.html" class="nav-link">이벤트 로그</a>
        <a href="./cctv-manage.html" class="nav-link active">CCTV 관리</a>
      </nav>
    </aside>

    <main class="main">
      <header class="header">
        <h1>CCTV 관리</h1>
        <div class="header-info">Camera Management</div>
      </header>

      <section class="content-section">
        <div class="section-title">CCTV 추가</div>

        <div class="form-row">
          <input class="input" type="text" placeholder="CCTV 이름 예: CAM-04">
          <input class="input" type="text" placeholder="설치 위치 예: 2공장 입구">
        </div>

        <div class="form-row">
          <input class="input" type="text" placeholder="영상 주소 또는 스트림 URL">
          <select class="input">
            <option>사용 중</option>
            <option>사용 안 함</option>
          </select>
        </div>

        <button class="button">CCTV 추가</button>
      </section>

      <section class="content-section">
        <div class="section-title">CCTV 목록</div>

        <table class="table">
          <thead>
            <tr>
              <th>CCTV ID</th>
              <th>이름</th>
              <th>설치 위치</th>
              <th>상태</th>
              <th>최근 감지</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td>CAM-01</td>
              <td>1공장 입구</td>
              <td><span class="status-badge status-safe">ACTIVE</span></td>
              <td>2026-07-02 10:24</td>
              <td>
                <button class="button secondary">수정</button>
              </td>
            </tr>

            <tr>
              <td>2</td>
              <td>CAM-02</td>
              <td>위험구역 A</td>
              <td><span class="status-badge status-warning">CHECK</span></td>
              <td>2026-07-02 10:31</td>
              <td>
                <button class="button secondary">수정</button>
              </td>
            </tr>

            <tr>
              <td>3</td>
              <td>CAM-03</td>
              <td>자재 보관 구역</td>
              <td><span class="status-badge status-safe">ACTIVE</span></td>
              <td>2026-07-02 10:42</td>
              <td>
                <button class="button secondary">수정</button>
              </td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>
</body>
</html>
