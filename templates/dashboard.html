<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>대시보드</title>

  <link rel="stylesheet" href="../static/css/common.css" />
  <link rel="stylesheet" href="../static/css/sidebar.css" />
  <link rel="stylesheet" href="../static/css/dashboard.css" />
</head>
<body>
  <div id="sidebar-container"></div>

  <main class="main dashboard-main">
    <h1>대시보드</h1>

    <section class="dashboard-summary">
      <div class="summary-card safety-card">
        <p>현재 안전 상태</p>

        <div class="safety-status">
          <img id="overallStatusIcon" class="safety-icon" src="../static/img/safe.svg" alt="안전 상태">
          <div>
            <strong id="overallStatus">-</strong>
            <span id="overallStatusText">-</span>
          </div>
        </div>
      </div>

      <div class="summary-card">
        <p>오늘 전체 경고</p>
        <strong id="todayWarningCount">-</strong>
        <span id="todayWarningChange">-</span>
      </div>

      <div class="summary-card">
        <p>PPE 착용률</p>
        <strong id="ppeRate">-</strong>
        <span id="ppeRateChange">-</span>
      </div>

      <div class="summary-card">
        <p>CCTV 연결 상태</p>
        <strong id="cctvStatus">-</strong>
        <span id="cctvStatusText">-</span>
      </div>
    </section>

    <section class="event-card">
      <h2>최근 이벤트</h2>

      <table class="event-table">
        <thead>
          <tr>
            <th>시간</th>
            <th>CCTV</th>
            <th>위반 유형</th>
            <th>위험도</th>
            <th>처리 상태</th>
          </tr>
        </thead>

        <tbody id="recentEventTable">
          <!-- dashboard.js에서 렌더링 -->
        </tbody>
      </table>
    </section>
  </main>

  <script src="../static/js/common.js"></script>
  <script src="../static/js/sidebar.js"></script>
  <script src="../static/js/dashboard.js"></script>
</body>
</html>
