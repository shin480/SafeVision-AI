<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>SafeVision-AI Login</title>
  <link rel="stylesheet" href="./css/style.css">
  <script src="./js/login.js" defer></script>
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <div class="login-logo">SafeVision-AI</div>
      <p class="login-subtitle">관리자 로그인</p>

      <form id="loginForm">
        <div class="login-field">
          <label for="adminId">아이디</label>
          <input id="adminId" type="text" placeholder="관리자 아이디 입력">
        </div>

        <div class="login-field">
          <label for="adminPw">비밀번호</label>
          <input id="adminPw" type="password" placeholder="비밀번호 입력">
        </div>

        <p id="loginMessage" class="login-message"></p>

        <button type="submit" class="button login-button">로그인</button>
      </form>
    </section>
  </main>
</body>
</html>
