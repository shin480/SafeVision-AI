<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>SafeVision-AI Monitoring</title>
  <link rel="stylesheet" href="./css/style.css">
  <script src="./js/common.js" defer></script>
  <script src="./js/monitoring.js" defer></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">SafeVision-AI</div>

      <nav class="nav-menu">
        <a href="./index.html" class="nav-link">대시보드</a>
        <a href="./monitoring.html" class="nav-link active">실시간 모니터링</a>
        <a href="./event-log.html" class="nav-link">이벤트 로그</a>
        <a href="./cctv-manage.html" class="nav-link">CCTV 관리</a>
      </nav>
    </aside>

    <main class="main">
      <header class="header">
        <h1>실시간 CCTV 모니터링</h1>
        <div class="header-info">Live Detection View</div>
      </header>

      <section class="content-section">
        <div class="section-title">CAM-01 현장 화면</div>

        <div class="video-box">
          실시간 영상 영역
        </div>

        <button class="button">감지 시작</button>
        <button class="button secondary">감지 중지</button>
      </section>

      <section class="card-grid">
        <div class="card safe">
          <div class="card-title">현재 상태</div>
          <div class="card-value">SAFE</div>
        </div>

        <div class="card warning">
          <div class="card-title">작업자 수</div>
          <div class="card-value">4</div>
        </div>

        <div class="card danger">
          <div class="card-title">위반 감지</div>
          <div class="card-value">1</div>
        </div>

        <div class="card critical">
          <div class="card-title">위험 점수</div>
          <div class="card-value">35</div>
        </div>
      </section>

      <section class="content-section">
        <div class="section-title">실시간 감지 결과</div>

        <table class="table">
          <thead>
            <tr>
              <th>객체</th>
              <th>신뢰도</th>
              <th>위치</th>
              <th>판정</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>person</td>
              <td>0.92</td>
              <td>x: 120, y: 85</td>
              <td><span class="status-badge status-safe">SAFE</span></td>
            </tr>
            <tr>
              <td>no_helmet</td>
              <td>0.86</td>
              <td>x: 240, y: 130</td>
              <td><span class="status-badge status-warning">WARNING</span></td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>
</body>
</html>
